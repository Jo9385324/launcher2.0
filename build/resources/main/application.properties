# QuantumLauncher - Application Configuration
# ???????????????????????????????????????????????????????????????????????????

# Application Name
spring.application.name=QuantumLauncher

# Server Configuration
server.port=8080
server.shutdown=graceful

# Database Configuration (SQLite)
spring.datasource.url=jdbc:sqlite:data/quantumlauncher.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# SQLite specific settings
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.quantumlauncher=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# CORS Configuration
cors.allowed-origins=http://localhost:*

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# AI Chat Configuration
ai.chat.api-key=demo
ai.chat.model=gpt-3.5-turbo

# Auth Configuration
# В production обязательно заменить на безопасный уникальный ключ
auth.token-encryption-key=change-me-very-strong-secret-key

